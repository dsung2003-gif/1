<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ERROR FIXED DETECTOR</title>
    <script async src="https://docs.opencv.org/4.x/opencv.js" onload="onOpenCvReady();"></script>
    <style>
        body { background:#111; color:white; text-align:center; font-family:sans-serif; padding-top: 30px; }
        #status { 
            font-size: 18px; color: #0f0; margin: 20px; padding: 15px;
            border: 1px solid #333; display: inline-block; min-width: 300px;
        }
        button { padding: 15px 30px; font-size: 16px; cursor: pointer; background: #444; color: white; border: none; }
        button:disabled { background: #222; color: #555; cursor: not-allowed; }
    </style>
</head>
<body>

<h2>이미지 감지 (에러 수정판)</h2>
<div id="status">OpenCV 로딩 중...</div><br>
<button id="startBtn" disabled>1. 화면 공유 시작</button>
<video id="video" autoplay playsinline style="display:none;"></video>

<script>
const status = document.getElementById("status");
const startBtn = document.getElementById("startBtn");
const video = document.getElementById("video");

let src, gray, res;
let templates = [];
let isRunning = false;

// 이미지 목록 (URL 확인 필수)
const imageUrls = [
    "https://i.ibb.co/3yRH1Hmz/1.png", "https://i.ibb.co/rG4nwvNQ/2.png",
    "https://i.ibb.co/hxXwKmp0/3.png", "https://i.ibb.co/yBFycHT2/4.png",
    "https://i.ibb.co/60YPKx7K/5.png", "https://i.ibb.co/Pz6FGPdq/6.png",
    "https://i.ibb.co/vCgC8tpB/7.png", "https://i.ibb.co/S792Rgmy/11.png",
    "https://i.ibb.co/tMw1m7wk/22.png", "https://i.ibb.co/9mYY0gtV/33.png",
    "https://i.ibb.co/KMx3CJW/44.png", "https://i.ibb.co/1Gx5RCsG/55.png",
    "https://i.ibb.co/n8q1fxHT/66.png", "https://i.ibb.co/99Pp9R1G/77.png"
];

function onOpenCvReady() {
    status.innerText = "이미지 데이터 준비 중...";
    loadTemplates();
}

async function loadTemplates() {
    let loadedCount = 0;
    const promises = imageUrls.map((url, i) => {
        return new Promise((resolve) => {
            let img = new Image();
            img.crossOrigin = "anonymous";
            img.src = url;
            img.onload = () => {
                let mat = cv.imread(img);
                let g = new cv.Mat();
                cv.cvtColor(mat, g, cv.COLOR_RGBA2GRAY);
                templates.push({ id: i + 1, mat: g });
                mat.delete();
                loadedCount++;
                status.innerText = `로딩 중: ${loadedCount}/${imageUrls.length}`;
                resolve();
            };
            img.onerror = () => resolve(); // 로드 실패 시 그냥 넘김
        });
    });
    await Promise.all(promises);
    status.innerText = "준비 완료! 시작 버튼을 누르세요.";
    startBtn.disabled = false;
}

function loop() {
    if (!isRunning) return;

    try {
        const vw = video.videoWidth;
        const vh = video.videoHeight;

        // [해결 1] 비디오 크기가 0이면 처리하지 않고 대기 (Bad size 에러 방지)
        if (vw === 0 || vh === 0) {
            requestAnimationFrame(loop);
            return;
        }

        // [해결 2] 메모리 객체가 없거나 크기가 바뀌었을 때만 재생성
        if (!src || src.cols !== vw || src.rows !== vh) {
            if (src) src.delete();
            if (gray) gray.delete();
            if (res) res.delete();
            src = new cv.Mat(vh, vw, cv.CV_8UC4);
            gray = new cv.Mat();
            res = new cv.Mat();
        }

        let cap = new cv.VideoCapture(video);
        cap.read(src);
        cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

        let maxVal = 0;
        let foundId = -1;

        for (let t of templates) {
            if (t.mat.cols > gray.cols || t.mat.rows > gray.rows) continue;

            cv.matchTemplate(gray, t.mat, res, cv.TM_CCOEFF_NORMED);
            let m = cv.minMaxLoc(res);

            if (m.maxVal > maxVal) {
                maxVal = m.maxVal;
                foundId = t.id;
            }
        }

        // 감도 조절 (0.7 정도로 낮춰서 테스트 추천)
        if (maxVal > 0.7) {
            status.innerText = `발견! 이미지 ${foundId} (정확도: ${Math.round(maxVal * 100)}%)`;
            status.style.color = "#0f0";
        } else {
            status.innerText = `스캔 중... (최고 유사도: ${Math.round(maxVal * 100)}%)`;
            status.style.color = "white";
        }

    } catch (e) {
        // 에러가 나더라도 루프가 멈추지 않게 함
        console.warn("OpenCV Loop Warning:", e);
    }

    setTimeout(loop, 200);
}

startBtn.onclick = async () => {
    try {
        // [해결 3] 화면 공유 권한 요청 시 에러 처리
        const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
        video.srcObject = stream;
        isRunning = true;
        status.innerText = "감지 시작...";
        loop();
    } catch (err) {
        if (err.name === 'NotAllowedError') {
            status.innerText = "권한 거부됨: 화면 공유를 허용해야 합니다.";
        } else {
            status.innerText = "오류 발생: " + err.message;
        }
        console.error(err);
    }
};
</script>
</body>
</html>

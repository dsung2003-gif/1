<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>FINAL STABLE FIX</title>
    <style>
        body { background:#111; color:white; text-align:center; font-family:sans-serif; padding-top: 50px; }
        #status { 
            font-size: 18px; font-weight: bold; color: #0f0; 
            margin: 20px auto; padding: 20px; width: 80%; max-width: 600px;
            border: 2px solid #444; background: #222; border-radius: 10px;
        }
        button { padding: 15px 40px; font-size: 18px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 8px; }
        button:disabled { background: #333; color: #777; cursor: not-allowed; }
        video { display: none; }
    </style>
</head>
<body>

<h2>실시간 감지 시스템 (로딩 오류 수정)</h2>
<div id="status">OpenCV 라이브러리를 불러오는 중...</div>
<button id="startBtn" disabled>화면 공유 시작</button>

<video id="video" autoplay playsinline></video>

<!-- OpenCV.js 로딩 방식을 수정했습니다 -->
<script>
var cvReady = false;
function onOpenCvReady() {
    cvReady = true;
    console.log("OpenCV.js is Ready.");
    checkAndInit();
}

// 라이브러리 로드 확인 후 실행하는 안전 장치
function checkAndInit() {
    if (typeof cv !== 'undefined' && cv.Mat) {
        status.innerText = "템플릿 이미지를 읽어들이는 중...";
        loadTemplates();
    } else {
        setTimeout(checkAndInit, 100); // 0.1초마다 재확인
    }
}
</script>
<script async src="https://docs.opencv.org/4.x/opencv.js" onload="onOpenCvReady();"></script>

<script>
const status = document.getElementById("status");
const startBtn = document.getElementById("startBtn");
const video = document.getElementById("video");

let src = null, gray = null, res = null;
let templates = [];
let isRunning = false;

const imageUrls = [
    "https://i.ibb.co/3yRH1Hmz/1.png", "https://i.ibb.co/rG4nwvNQ/2.png",
    "https://i.ibb.co/hxXwKmp0/3.png", "https://i.ibb.co/yBFycHT2/4.png",
    "https://i.ibb.co/60YPKx7K/5.png", "https://i.ibb.co/Pz6FGPdq/6.png",
    "https://i.ibb.co/vCgC8tpB/7.png", "https://i.ibb.co/S792Rgmy/11.png",
    "https://i.ibb.co/tMw1m7wk/22.png", "https://i.ibb.co/9mYY0gtV/33.png",
    "https://i.ibb.co/KMx3CJW/44.png", "https://i.ibb.co/1Gx5RCsG/55.png",
    "https://i.ibb.co/n8q1fxHT/66.png", "https://i.ibb.co/99Pp9R1G/77.png"
];

async function loadTemplates() {
    let count = 0;
    const promises = imageUrls.map((url, i) => {
        return new Promise((resolve) => {
            let img = new Image();
            img.crossOrigin = "anonymous";
            img.src = url;
            img.onload = () => {
                try {
                    let mat = cv.imread(img);
                    let g = new cv.Mat();
                    cv.cvtColor(mat, g, cv.COLOR_RGBA2GRAY);
                    templates.push({ id: i + 1, mat: g });
                    mat.delete();
                    count++;
                    status.innerText = `이미지 로드 중 (${count}/${imageUrls.length})`;
                } catch(e) { console.error("Mat 생성 실패:", e); }
                resolve();
            };
            img.onerror = () => {
                console.error("이미지 경로 오류:", url);
                resolve();
            };
        });
    });
    await Promise.all(promises);
    status.innerText = "준비 완료! 시작 버튼을 누르세요.";
    startBtn.disabled = false;
}

function loop() {
    if (!isRunning) return;

    try {
        const vw = video.videoWidth;
        const vh = video.videoHeight;

        if (vw === 0 || vh === 0) {
            requestAnimationFrame(loop);
            return;
        }

        if (!src || src.cols !== vw || src.rows !== vh) {
            if (src) src.delete();
            if (gray) gray.delete();
            if (res) res.delete();
            src = new cv.Mat(vh, vw, cv.CV_8UC4);
            gray = new cv.Mat();
            res = new cv.Mat();
        }

        let cap = new cv.VideoCapture(video);
        cap.read(src);
        cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

        let bestMatch = { id: -1, val: 0 };
        for (let t of templates) {
            if (t.mat.cols > gray.cols || t.mat.rows > gray.rows) continue;
            cv.matchTemplate(gray, t.mat, res, cv.TM_CCOEFF_NORMED);
            let m = cv.minMaxLoc(res);
            if (m.maxVal > bestMatch.val) {
                bestMatch = { id: t.id, val: m.maxVal };
            }
        }

        if (bestMatch.val > 0.7) {
            status.innerText = `✅ 감지됨: ${bestMatch.id} (${Math.round(bestMatch.val * 100)}%)`;
            status.style.color = "#0f0";
        } else {
            status.innerText = `🔍 스캔 중... (최고 유사도: ${Math.round(bestMatch.val * 100)}%)`;
            status.style.color = "white";
        }
    } catch (e) { console.error(e); }
    setTimeout(loop, 150);
}

startBtn.onclick = async () => {
    try {
        const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
        video.srcObject = stream;
        video.onloadedmetadata = () => {
            isRunning = true;
            loop();
        };
    } catch (err) {
        status.innerText = "화면 공유 권한이 필요합니다.";
    }
};
</script>
</body>
</html>

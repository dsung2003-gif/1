<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>DETECTOR FINAL VERSION</title>
    <script async src="https://docs.opencv.org/4.x/opencv.js" onload="onOpenCvReady();"></script>
    <style>
        body { background:#111; color:white; text-align:center; font-family:sans-serif; padding-top: 50px; }
        /* 상태 표시창: 가독성 극대화 */
        #status { 
            font-size: 18px; font-weight: bold; color: #0f0; 
            margin: 20px auto; padding: 20px; width: 80%; max-width: 600px;
            border: 2px solid #444; background: #222; border-radius: 10px;
        }
        button { 
            padding: 15px 40px; font-size: 18px; cursor: pointer; 
            background: #007bff; color: white; border: none; border-radius: 8px;
            transition: 0.3s;
        }
        button:disabled { background: #333; color: #777; cursor: not-allowed; }
        button:hover:not(:disabled) { background: #0056b3; }
        video { display: none; } /* 비디오는 숨김 처리 */
    </style>
</head>
<body>

<h2>실시간 이미지 감지 시스템</h2>
<div id="status">OpenCV 라이브러리를 불러오는 중...</div>
<button id="startBtn" disabled>화면 공유 시작</button>

<video id="video" autoplay playsinline></video>

<script>
const status = document.getElementById("status");
const startBtn = document.getElementById("startBtn");
const video = document.getElementById("video");

let src = null, gray = null, res = null;
let templates = [];
let isRunning = false;

// 이미지 목록 (URL이 정확해야 합니다)
const imageUrls = [
    "https://i.ibb.co/3yRH1Hmz/1.png", "https://i.ibb.co/rG4nwvNQ/2.png",
    "https://i.ibb.co/hxXwKmp0/3.png", "https://i.ibb.co/yBFycHT2/4.png",
    "https://i.ibb.co/60YPKx7K/5.png", "https://i.ibb.co/Pz6FGPdq/6.png",
    "https://i.ibb.co/vCgC8tpB/7.png", "https://i.ibb.co/S792Rgmy/11.png",
    "https://i.ibb.co/tMw1m7wk/22.png", "https://i.ibb.co/9mYY0gtV/33.png",
    "https://i.ibb.co/KMx3CJW/44.png", "https://i.ibb.co/1Gx5RCsG/55.png",
    "https://i.ibb.co/n8q1fxHT/66.png", "https://i.ibb.co/99Pp9R1G/77.png"
];

// 1. 초기화: OpenCV 로드 완료 후 실행
function onOpenCvReady() {
    status.innerText = "템플릿 이미지를 읽어들이는 중...";
    loadTemplates();
}

// 2. 이미지 프리로딩
async function loadTemplates() {
    const promises = imageUrls.map((url, i) => {
        return new Promise((resolve) => {
            let img = new Image();
            img.crossOrigin = "anonymous";
            img.src = url;
            img.onload = () => {
                try {
                    let mat = cv.imread(img);
                    let g = new cv.Mat();
                    cv.cvtColor(mat, g, cv.COLOR_RGBA2GRAY);
                    templates.push({ id: i + 1, mat: g });
                    mat.delete();
                } catch(e) { console.error("이미지 처리 실패:", i); }
                resolve();
            };
            img.onerror = () => {
                console.warn("이미지 로드 실패:", url);
                resolve();
            };
        });
    });
    await Promise.all(promises);
    status.innerText = "준비 완료! 시작 버튼을 누르세요.";
    startBtn.disabled = false;
}

// 3. 메인 분석 루프 (가장 중요한 부분)
function loop() {
    if (!isRunning) return;

    try {
        const vw = video.videoWidth;
        const vh = video.videoHeight;

        // [방어 1] 비디오가 준비 안 됐으면 그릇을 만들지 않고 대기
        if (vw === 0 || vh === 0) {
            requestAnimationFrame(loop);
            return;
        }

        // [방어 2] 그릇(Mat) 크기가 현재 비디오와 다를 때만 안전하게 교체
        if (!src || src.cols !== vw || src.rows !== vh) {
            if (src) src.delete();
            if (gray) gray.delete();
            if (res) res.delete();

            src = new cv.Mat(vh, vw, cv.CV_8UC4);
            gray = new cv.Mat();
            res = new cv.Mat();
            console.log(`그릇 크기 재설정: ${vw}x${vh}`);
        }

        // [방어 3] 비디오 프레임 읽기
        let cap = new cv.VideoCapture(video);
        cap.read(src);
        cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

        let bestMatch = { id: -1, val: 0 };

        for (let t of templates) {
            // 템플릿이 화면보다 크면 오류나므로 건너뜀
            if (t.mat.cols > gray.cols || t.mat.rows > gray.rows) continue;

            cv.matchTemplate(gray, t.mat, res, cv.TM_CCOEFF_NORMED);
            let m = cv.minMaxLoc(res);

            if (m.maxVal > bestMatch.val) {
                bestMatch = { id: t.id, val: m.maxVal };
            }
        }

        // 결과 표시 (감도 0.7로 설정 - 필요시 수정)
        if (bestMatch.val > 0.7) {
            status.innerText = `✅ 감지됨: 이미지 ${bestMatch.id} (일치율: ${Math.round(bestMatch.val * 100)}%)`;
            status.style.color = "#0f0";
            status.style.borderColor = "#0f0";
        } else {
            status.innerText = `🔍 스캔 중... (최고 유사도: ${Math.round(bestMatch.val * 100)}%)`;
            status.style.color = "white";
            status.style.borderColor = "#444";
        }

    } catch (e) {
        console.error("루프 에러 발생 (무시하고 재시도):", e);
    }

    // 부하 분산을 위해 150ms 간격으로 실행
    setTimeout(loop, 150);
}

// 4. 시작 버튼 클릭 시 권한 요청
startBtn.onclick = async () => {
    try {
        // [방어 4] 권한 거부 에러 잡기
        const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
        video.srcObject = stream;
        
        // 비디오가 실제로 시작될 때 루프 가동
        video.onloadedmetadata = () => {
            isRunning = true;
            status.innerText = "감지 프로세스 시작됨...";
            loop();
        };
    } catch (err) {
        if (err.name === "NotAllowedError") {
            status.innerText = "⚠️ 에러: 화면 공유 창에서 '공유' 버튼을 누르셔야 합니다.";
            status.style.color = "orange";
        } else {
            status.innerText = "⚠️ 오류: " + err.message;
        }
    }
};
</script>
</body>
</html>

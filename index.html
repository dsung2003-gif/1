<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>FINAL DETECTOR FIX</title>
    <!-- OpenCV 로드 -->
    <script async src="https://docs.opencv.org/4.x/opencv.js" onload="onOpenCvReady();"></script>
    <style>
        body { background:#111; color:white; text-align:center; font-family:sans-serif; padding: 20px; }
        /* 상태 표시창을 눈에 띄게 수정 */
        #status { 
            font-size: 20px; font-weight: bold; padding: 20px; 
            margin: 20px auto; width: 80%; border: 2px solid #555;
            background: #222; min-height: 50px;
        }
        button { padding:15px 30px; font-size: 18px; cursor: pointer; background: #444; color: white; border: none; border-radius: 5px; }
        button:disabled { background: #222; color: #666; }
        video { border: 1px solid #333; margin-top: 20px; display: none; }
    </style>
</head>
<body>

<h2>이미지 감지 시스템</h2>

<!-- 여기가 상태창입니다! -->
<div id="status">OpenCV 라이브러리 불러오는 중...</div>

<button id="startBtn" disabled>1. 화면 공유 시작</button>

<video id="video" autoplay playsinline></video>

<script>
const status = document.getElementById("status");
const startBtn = document.getElementById("startBtn");
const video = document.getElementById("video");

let src, gray, res;
let templates = [];
let isRunning = false;

// 이미지 목록
const imageUrls = [
    "https://i.ibb.co/3yRH1Hmz/1.png", "https://i.ibb.co/rG4nwvNQ/2.png",
    "https://i.ibb.co/hxXwKmp0/3.png", "https://i.ibb.co/yBFycHT2/4.png",
    "https://i.ibb.co/60YPKx7K/5.png", "https://i.ibb.co/Pz6FGPdq/6.png",
    "https://i.ibb.co/vCgC8tpB/7.png", "https://i.ibb.co/S792Rgmy/11.png",
    "https://i.ibb.co/tMw1m7wk/22.png", "https://i.ibb.co/9mYY0gtV/33.png",
    "https://i.ibb.co/KMx3CJW/44.png", "https://i.ibb.co/1Gx5RCsG/55.png",
    "https://i.ibb.co/n8q1fxHT/66.png", "https://i.ibb.co/99Pp9R1G/77.png"
];

function onOpenCvReady() {
    status.innerText = "이미지 불러오는 중... 잠시만 기다리세요.";
    loadTemplates();
}

async function loadTemplates() {
    let count = 0;
    const promises = imageUrls.map((url, i) => {
        return new Promise((resolve) => {
            let img = new Image();
            img.crossOrigin = "anonymous"; 
            img.src = url;
            img.onload = () => {
                try {
                    let mat = cv.imread(img);
                    let g = new cv.Mat();
                    cv.cvtColor(mat, g, cv.COLOR_RGBA2GRAY);
                    templates.push({ id: i + 1, mat: g });
                    mat.delete();
                    count++;
                    status.innerText = `이미지 로드 중 (${count}/${imageUrls.length})`;
                } catch (e) { console.error("이미지 변환 실패:", e); }
                resolve();
            };
            img.onerror = () => {
                console.error("이미지 로드 실패 (CORS 가능성):", url);
                resolve();
            };
        });
    });
    await Promise.all(promises);
    status.innerText = "준비 완료! '화면 공유 시작' 버튼을 누르세요.";
    startBtn.disabled = false;
}

function loop() {
    if (!isRunning) return;

    try {
        const w = video.videoWidth;
        const h = video.videoHeight;

        // 비디오 해상도가 아직 0이면 대기
        if (w === 0 || h === 0) {
            requestAnimationFrame(loop);
            return;
        }

        // [핵심 수정] 매 프레임마다 그릇 크기를 체크하고 필요할 때만 재할당
        if (!src || src.cols !== w || src.rows !== h) {
            if (src) src.delete();
            if (gray) gray.delete();
            if (res) res.delete();
            src = new cv.Mat(h, w, cv.CV_8UC4);
            gray = new cv.Mat();
            res = new cv.Mat();
            console.log(`그릇 크기 조정됨: ${w}x${h}`);
        }

        let cap = new cv.VideoCapture(video);
        cap.read(src);
        cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

        let bestMatch = { id: null, val: 0 };

        for (let t of templates) {
            // 템플릿이 화면보다 크면 무시 (에러 방지)
            if (t.mat.cols > gray.cols || t.mat.rows > gray.rows) continue;

            cv.matchTemplate(gray, t.mat, res, cv.TM_CCOEFF_NORMED);
            let m = cv.minMaxLoc(res);

            // 가장 유사도가 높은 것을 기록
            if (m.maxVal > bestMatch.val) {
                bestMatch = { id: t.id, val: m.maxVal };
            }
        }

        // 감도를 0.6으로 대폭 낮춤 (테스트용)
        if (bestMatch.val > 0.6) {
            status.innerText = `✅ 감지 성공! 이미지 ${bestMatch.id} (일치율: ${Math.round(bestMatch.val * 100)}%)`;
            status.style.borderColor = "#0f0";
            status.style.color = "#0f0";
        } else {
            status.innerText = `🔍 찾는 중... (현재 최고 유사도: ${Math.round(bestMatch.val * 100)}%)`;
            status.style.borderColor = "#555";
            status.style.color = "white";
        }

    } catch (e) {
        console.error("루프 에러 발생:", e);
    }

    // 부하를 줄이기 위해 0.15초마다 실행
    setTimeout(loop, 150);
}

startBtn.onclick = async () => {
    try {
        stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
        video.srcObject = stream;
        isRunning = true;
        status.innerText = "화면 분석 시작...";
        loop();
    } catch (err) {
        status.innerText = "화면 공유가 거부되었습니다.";
        console.error(err);
    }
};
</script>
</body>
</html>

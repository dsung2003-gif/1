<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>CV MAT FIX</title>
    <style>
        body { background:#111; color:white; text-align:center; font-family:sans-serif; padding-top: 50px; }
        #status { 
            font-size: 18px; font-weight: bold; color: #0f0; 
            margin: 20px auto; padding: 20px; width: 80%; max-width: 600px;
            border: 2px solid #444; background: #222; border-radius: 10px;
        }
        button { padding: 15px 40px; font-size: 18px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 8px; }
        button:disabled { background: #333; color: #777; cursor: not-allowed; }
        video { display: none; }
    </style>

    <!-- 1. OpenCV 설정 모듈을 먼저 선언 (가장 중요) -->
    <script>
        var Module = {
            onRuntimeInitialized: function() {
                // OpenCV가 완전히 로드되면 이 함수가 실행됩니다.
                console.log("OpenCV Runtime Ready");
                onOpenCvInitSuccess();
            }
        };
    </script>
    
    <!-- 2. 그 다음 OpenCV 라이브러리를 로드 -->
    <script async src="https://docs.opencv.org/4.x/opencv.js"></script>
</head>
<body>

<h2>감지 시스템 (에러 차단판)</h2>
<div id="status">라이브러리 엔진 초기화 중...</div>
<button id="startBtn" disabled>화면 공유 시작</button>

<video id="video" autoplay playsinline></video>

<script>
const status = document.getElementById("status");
const startBtn = document.getElementById("startBtn");
const video = document.getElementById("video");

let src, gray, res;
let templates = [];
let isRunning = false;

// 이미지 목록
const imageUrls = [
    "https://i.ibb.co/3yRH1Hmz/1.png", "https://i.ibb.co/rG4nwvNQ/2.png",
    "https://i.ibb.co/hxXwKmp0/3.png", "https://i.ibb.co/yBFycHT2/4.png",
    "https://i.ibb.co/60YPKx7K/5.png", "https://i.ibb.co/Pz6FGPdq/6.png",
    "https://i.ibb.co/vCgC8tpB/7.png", "https://i.ibb.co/S792Rgmy/11.png",
    "https://i.ibb.co/tMw1m7wk/22.png", "https://i.ibb.co/9mYY0gtV/33.png",
    "https://i.ibb.co/KMx3CJW/44.png", "https://i.ibb.co/1Gx5RCsG/55.png",
    "https://i.ibb.co/n8q1fxHT/66.png", "https://i.ibb.co/99Pp9R1G/77.png"
];

// OpenCV가 완전히 준비되었을 때만 호출됨
function onOpenCvInitSuccess() {
    status.innerText = "이미지 데이터를 준비합니다...";
    loadTemplates();
}

async function loadTemplates() {
    let count = 0;
    // 이제 여기서는 cv.Mat이 무조건 존재함
    for (let i = 0; i < imageUrls.length; i++) {
        try {
            await new Promise((resolve) => {
                let img = new Image();
                img.crossOrigin = "anonymous";
                img.src = imageUrls[i];
                img.onload = () => {
                    let mat = cv.imread(img);
                    let g = new cv.Mat();
                    cv.cvtColor(mat, g, cv.COLOR_RGBA2GRAY);
                    templates.push({ id: i + 1, mat: g });
                    mat.delete();
                    count++;
                    status.innerText = `데이터 로드 중 (${count}/${imageUrls.length})`;
                    resolve();
                };
                img.onerror = () => resolve();
            });
        } catch(e) { console.error(e); }
    }
    status.innerText = "준비 완료!";
    startBtn.disabled = false;
}

function loop() {
    if (!isRunning) return;

    try {
        if (video.videoWidth === 0) {
            requestAnimationFrame(loop);
            return;
        }

        const vw = video.videoWidth;
        const vh = video.videoHeight;

        if (!src || src.cols !== vw || src.rows !== vh) {
            if (src) src.delete();
            if (gray) gray.delete();
            if (res) res.delete();
            src = new cv.Mat(vh, vw, cv.CV_8UC4);
            gray = new cv.Mat();
            res = new cv.Mat();
        }

        let cap = new cv.VideoCapture(video);
        cap.read(src);
        cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

        let bestMatch = { id: -1, val: 0 };
        for (let t of templates) {
            if (t.mat.cols > gray.cols || t.mat.rows > gray.rows) continue;
            cv.matchTemplate(gray, t.mat, res, cv.TM_CCOEFF_NORMED);
            let m = cv.minMaxLoc(res);
            if (m.maxVal > bestMatch.val) {
                bestMatch = { id: t.id, val: m.maxVal };
            }
        }

        if (bestMatch.val > 0.75) {
            status.innerText = `감지: 이미지 ${bestMatch.id} (${Math.round(bestMatch.val * 100)}%)`;
            status.style.color = "#0f0";
        } else {
            status.innerText = `대기 중... (최고 유사도: ${Math.round(bestMatch.val * 100)}%)`;
            status.style.color = "white";
        }
    } catch (e) {
        console.error("루프 중 에러:", e);
    }
    setTimeout(loop, 150);
}

startBtn.onclick = async () => {
    try {
        const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
        video.srcObject = stream;
        video.onloadedmetadata = () => {
            isRunning = true;
            loop();
        };
    } catch (err) {
        status.innerText = "권한 거부됨";
    }
};
</script>
</body>
</html>
